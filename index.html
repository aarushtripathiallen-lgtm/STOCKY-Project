<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOCKY | AI Investment Intelligence</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; text-align: center; }
        .hero { padding: 100px 20px; }
        .cta-button { padding: 15px 30px; background: var(--primary); color: white; border-radius: 8px; text-decoration: none; font-weight: bold; display: inline-block; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 50px; max-width: 1000px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; opacity: 0; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>STOCKY</h1>
        <p>Your AI-powered companion for smarter retail investing.</p>
        <br>
        <a href="YOUR_RENDER_URL_HERE" class="cta-button">Launch Dashboard</a>
    </div>

    <div class="features" id="features"></div>

    <script>
        const features = ["Live Stock Data", "Interactive Charts", "AI Stock Prediction", "News Insights", "AI Chatbot", "AI Fallback", "Trend Analysis", "Retail Focus"];
        const container = document.getElementById('features');
        
        // Dynamically create cards
        features.forEach(f => {
            container.innerHTML += `<div class="card"><h3>${f}</h3></div>`;
        });

        // Anime.js Entrance Animation
        anime({
            targets: '.card',
            translateY: [50, 0],
            opacity: [0, 1],
            delay: anime.stagger(100),
            duration: 1000,
            easing: 'easeOutQuad'
        });
    </script>
</body>
</html>
