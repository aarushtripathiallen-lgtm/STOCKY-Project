<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STOCKY | Intelligence Redefined</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --primary: #3b82f6; }
        body { background: #050505; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .hero { padding: 80px 20px; text-align: center; }
        .cta { padding: 20px 40px; background: var(--primary); color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; }
        
        /* Vertical Grid */
        .features-grid { width: 90%; max-width: 800px; display: grid; grid-template-columns: 1fr; gap: 30px; padding-bottom: 100px; }
        
        .card { background: var(--glass); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .card h2 { color: var(--primary); margin-top: 0; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>STOCKY</h1>
        <p>Your AI-powered companion for smarter retail investing.</p>
        <a href="YOUR_RENDER_URL_HERE" class="cta">Launch Dashboard</a>
    </div>

    <div class="features-grid" id="features"></div>

    <script>
        const details = [
            { h: "Live Stock Data", p: "Access real-time, low-latency market feeds. Search by ticker or company name to view current pricing, volume, and comprehensive market metrics." },
            { h: "Interactive Charts", p: "Visualize historical price performance with our custom charting engine. Identify trends, support levels, and resistance patterns at a glance." },
            { h: "AI Stock Prediction", p: "Leverage advanced machine learning models to estimate future market movements based on historical data patterns and technical indicators." },
            { h: "AI News & Insights", p: "Our AI scrapes and synthesizes global financial news, providing an 'impact score' to help you understand how headlines move the needle." },
            { h: "AI Chatbot", p: "A dedicated financial assistant trained to explain complex terms, analyze market concepts, and provide context for your investment decisions." },
            { h: "AI Fallback System", p: "Reliability is key. Our redundant AI core ensures that even if one service is down, your analysis continues without interruption." },
            { h: "Market Trend Analysis", p: "Deep analysis of bull/bear market conditions to help you make informed, long-term strategic decisions." },
            { h: "Retail Investor Focus", p: "Designed specifically for individual needs: create personalized watchlists, set custom alerts, and track your specific portfolio performance." }
        ];

        const container = document.getElementById('features');
        details.forEach(d => {
            container.innerHTML += `<div class="card"><h2>${d.h}</h2><p>${d.p}</p></div>`;
        });

        // Animation
        anime({
            targets: '.card',
            opacity: [0, 1],
            translateY: [40, 0],
            delay: anime.stagger(150),
            easing: 'easeOutElastic(1, .5)'
        });
    </script>
</body>
</html>
