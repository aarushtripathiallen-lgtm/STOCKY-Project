<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="STOCKY AI - Institutional Grade Investing">
    <meta property="og:description" content="Next-generation AI analytics for the modern retail investor.">
    <title>STOCKY | Global AI Financial Intelligence</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        /* --- 1. CORE VARIABLES & NEW COLOR PALETTE --- */
        :root {
            --bg-deep: #020617; /* Even darker blue/black for contrast */
            --bg-card: rgba(15, 23, 42, 0.7);
            --primary: #06b6d4; /* Electric Cyan */
            --primary-glow: rgba(6, 182, 212, 0.5);
            --secondary: #8b5cf6; /* Deep Violet */
            --secondary-glow: rgba(139, 92, 246, 0.4);
            --text-main: #ffffff; /* Bright white for primary text */
            --text-muted: #cbd5e1; /* Lighter slate for better readability */
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* --- 2. COMPLEX BACKGROUNDS --- */
        .background-wrapper {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;
            background-image: 
                linear-gradient(var(--glass-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .ambient-light { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; }
        .light-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--primary-glow); }
        .light-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: var(--secondary-glow); }

        .bg-chart { position: absolute; bottom: 0; left: 0; width: 100%; height: 60vh; opacity: 0.2; }
        .bg-chart path { fill: none; stroke: var(--primary); stroke-width: 3; stroke-dasharray: 3000; stroke-dashoffset: 3000; }

        /* --- 3. NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 50px;
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; color: white; display: flex; align-items: center; gap: 10px;}
        .logo span { color: var(--primary); }
        .nav-links a { color: var(--text-muted); text-decoration: none; margin-left: 30px; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: var(--primary); }

        /* --- 4. HERO SECTION --- */
        .hero {
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 0 20px; position: relative;
        }
        .hero-badge {
            background: rgba(6, 182, 212, 0.1); color: var(--primary); padding: 8px 20px;
            border-radius: 50px; font-size: 0.9rem; font-weight: 700; letter-spacing: 2px;
            border: 1px solid rgba(6, 182, 212, 0.4); margin-bottom: 30px; opacity: 0;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .hero h1 { font-size: clamp(3.5rem, 8vw, 6.5rem); line-height: 1.1; font-weight: 900; letter-spacing: -2px; margin-bottom: 25px; }
        .word { display: inline-block; opacity: 0; transform: translateY(50px); }
        
        /* New Text Gradients */
        .text-gradient { background: linear-gradient(to right, #ffffff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .text-gradient-alt { background: linear-gradient(to right, #ffffff, var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .hero p { max-width: 750px; font-size: 1.3rem; color: var(--text-muted); margin-bottom: 50px; min-height: 60px; /* Prevents layout shift during typing */ }
        .typing-cursor { display: inline-block; width: 3px; height: 1.2em; background-color: var(--primary); vertical-align: text-bottom; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .cta-btn {
            padding: 20px 50px; font-size: 1.2rem; font-weight: bold; color: white; text-decoration: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 8px; box-shadow: 0 10px 30px var(--secondary-glow);
            transition: transform 0.3s, box-shadow 0.3s; opacity: 0; border: 1px solid rgba(255,255,255,0.3);
        }
        .cta-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(139, 92, 246, 0.7); }

        /* --- 5. MASSIVE FEATURE CARDS WITH PRO FLOAT --- */
        .features-section { padding: 100px 20px; max-width: 1000px; margin: 0 auto; }
        .section-title { text-align: center; font-size: 3.5rem; margin-bottom: 80px; opacity: 0; font-weight: 900; }
        
        .feature-container { display: flex; flex-direction: column; gap: 60px; }
        
        .feature-card {
            background: var(--bg-card); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 60px;
            display: flex; flex-direction: column; gap: 20px; position: relative; overflow: hidden;
            opacity: 0; /* Prepped for scroll reveal */
            /* Advanced Float & Tilt */
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.5s ease, border-color 0.4s;
            cursor: default;
        }
        
        .feature-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 30px var(--primary-glow);
            border-color: var(--primary);
        }

        .feature-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, var(--primary), var(--secondary)); opacity: 0.8;
        }

        .feature-header { display: flex; align-items: center; gap: 20px; }
        .feature-number { font-size: 3.5rem; font-weight: 900; color: rgba(255,255,255,0.05); }
        
        /* Inner elements hidden initially for progressive reveal */
        .card-inner-title { font-size: 2.2rem; color: white; letter-spacing: -1px; opacity: 0; }
        .card-inner-text { font-size: 1.15rem; color: var(--text-muted); max-width: 800px; opacity: 0; }
        
        .data-tags { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .tag { 
            background: rgba(255,255,255,0.05); padding: 8px 18px; border-radius: 8px; 
            font-size: 0.9rem; font-weight: 600; border: 1px solid var(--glass-border); 
            color: var(--primary); opacity: 0; 
        }

        /* --- 6. FOOTER --- */
        footer { border-top: 1px solid var(--glass-border); padding: 50px 20px; text-align: center; margin-top: 100px; color: var(--text-muted); font-weight: 500; }
    </style>
</head>
<body>

    <div class="background-wrapper">
        <div class="ambient-light light-1"></div>
        <div class="ambient-light light-2"></div>
        <svg class="bg-chart" viewBox="0 0 1000 300" preserveAspectRatio="none">
            <path id="chart-line" d="M0,250 C50,250 100,200 150,220 C200,240 250,150 300,180 C350,210 400,100 450,130 C500,160 550,50 600,90 C650,130 700,40 750,60 C800,80 850,20 900,40 C950,60 1000,10 1000,10" />
            <linearGradient id="chart-gradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="rgba(6, 182, 212, 0.2)" />
                <stop offset="100%" stop-color="rgba(6, 182, 212, 0)" />
            </linearGradient>
            <path d="M0,250 C50,250 100,200 150,220 C200,240 250,150 300,180 C350,210 400,100 450,130 C500,160 550,50 600,90 C650,130 700,40 750,60 C800,80 850,20 900,40 C950,60 1000,10 1000,10 L1000,300 L0,300 Z" fill="url(#chart-gradient)" opacity="0.5"/>
        </svg>
    </div>

    <nav>
        <div class="logo">STOCKY<span>.AI</span></div>
        <div class="nav-links">
            <a href="#features">Platform</a>
            <a href="#about">Technology</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-badge">BETA V1.0 - GLOBAL DATA ACTIVE</div>
        <h1>
            <span class="word text-gradient">Intelligence</span> <span class="word text-gradient">Redefined.</span><br>
            <span class="word text-gradient-alt">Alpha</span> <span class="word text-gradient-alt">Unlocked.</span>
        </h1>
        <p id="hero-desc-container"><span id="hero-desc"></span><span class="typing-cursor"></span></p>
        <a href="YOUR_RENDER_URL_HERE" class="cta-btn" id="hero-cta">Initialize Dashboard</a>
    </header>

    <section class="features-section" id="features">
        <h2 class="section-title text-gradient">Core Architecture</h2>
        <div class="feature-container" id="cards-container">
            </div>
    </section>

    <footer>
        <p>&copy; 2026 STOCKY AI. Powered by advanced Neural Networks and Global NLP.</p>
    </footer>

    <script>
        // 1. Expanded Data Structure (Including the new NLP Feature)
        const featuresData = [
            { 
                num: "01", h: "Live Market Terminal", 
                p: "Access sub-millisecond market feeds bypassing traditional retail lag. We provide a consolidated, low-latency view of real-time pricing, volume spikes, and volatility metrics. Search thousands of global tickers instantly.",
                tags: ["WebSocket Feeds", "Real-Time Pricing", "Volume Tracking"]
            },
            { 
                num: "02", h: "Interactive Charting Engine", 
                p: "Visualize historical price performance with our proprietary, high-frame-rate charting suite. Overlay advanced technical indicators, identify critical support/resistance bands, and track momentum oscillators seamlessly.",
                tags: ["Candlestick Pro", "MACD / RSI", "Fibonacci Retracements"]
            },
            { 
                num: "03", h: "Predictive ML Models", 
                p: "Leverage advanced machine learning (LSTM) to estimate future market movements based on historical patterns. Our AI acts as your quantitative analyst, finding statistical probabilities hidden in the noise.",
                tags: ["Neural Networks", "Pattern Recognition", "Probabilistic Forecasting"]
            },
            { 
                num: "04", h: "Algorithmic News Sentiment", 
                p: "The market moves on headlines. Our AI scrapes global financial news, earnings reports, and SEC filings in real-time, assigning an 'Impact Score' to help you understand what actually moves the needle.",
                tags: ["Sentiment Analysis", "Impact Scoring", "Live News Aggregation"]
            },
            { 
                num: "05", h: "Conversational Financial AI", 
                p: "Interact directly with your portfolio. Our chatbot acts as a dedicated financial tutor, explaining complex macroeconomic concepts, summarizing corporate earnings, and providing context for your specific trades.",
                tags: ["LLM Integration", "Contextual Help", "Market Education"]
            },
            { 
                num: "06", h: "Strategic Trend Recognition", 
                p: "Look beyond the daily fluctuations. Our analysis tools provide long-term trend identification, helping you distinguish between temporary market volatility and fundamental shifts in the macroeconomic landscape.",
                tags: ["Bull/Bear Diagnostics", "Moving Averages", "Macro Analysis"]
            },
            { 
                num: "07", h: "Global NLP Translation", 
                p: "STOCKY utilizes advanced Natural Language Processing to seamlessly understand, analyze, and communicate financial data in languages from all across the globe. Break down international market barriers instantly.",
                tags: ["Multilingual NLP", "Real-time Translation", "Borderless Markets"]
            }
        ];

        // 2. Inject Cards into HTML
        const container = document.getElementById('cards-container');
        featuresData.forEach(data => {
            let tagsHtml = data.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            container.innerHTML += `
                <div class="feature-card">
                    <div class="feature-header">
                        <span class="feature-number">${data.num}</span>
                        <h2 class="card-inner-title">${data.h}</h2>
                    </div>
                    <p class="card-inner-text">${data.p}</p>
                    <div class="data-tags">${tagsHtml}</div>
                </div>
            `;
        });

        // 3. Hero Section Typewriter Effect
        const heroText = "Your institutional-grade AI companion for smarter retail investing. Discover trends, analyze global news, and execute with absolute confidence.";
        const heroDescElement = document.getElementById('hero-desc');
        
        function typeWriter(text, i) {
            if (i < text.length) {
                heroDescElement.innerHTML += text.charAt(i);
                setTimeout(() => typeWriter(text, i + 1), 25); // Speed of typing
            }
        }

        // 4. Master Animation Timeline (Hero Section)
        const masterTl = anime.timeline({ easing: 'easeOutExpo' });

        masterTl
            .add({
                targets: '#chart-line',
                strokeDashoffset: [anime.setDashoffset, 0],
                duration: 3000,
                easing: 'easeInOutSine'
            })
            .add({ targets: '.hero-badge', opacity: [0, 1], translateY: [20, 0], duration: 800 }, '-=2000')
            .add({ targets: '.word', opacity: [0, 1], translateY: [50, 0], duration: 800, delay: anime.stagger(150) }, '-=1500')
            .add({ 
                targets: '#hero-desc-container', 
                opacity: [0, 1], 
                duration: 100, 
                complete: function() { typeWriter(heroText, 0); } // Trigger typewriter after fade in
            }, '-=800')
            .add({ targets: '#hero-cta', opacity: [0, 1], scale: [0.9, 1], duration: 800 }, '+=1000'); // Wait for typing to mostly finish

        // 5. Advanced Scroll Animations (Progressive Reveal inside Cards)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    
                    // Create a mini-timeline for each card that enters the screen
                    const cardTl = anime.timeline({ easing: 'easeOutQuint' });
                    
                    cardTl
                        // Slide the card up
                        .add({ targets: card, opacity: [0, 1], translateY: [80, 0], duration: 800 })
                        // Fade in the Title and Paragraph
                        .add({ 
                            targets: card.querySelectorAll('.card-inner-title, .card-inner-text'), 
                            opacity: [0, 1], 
                            translateY: [20, 0], 
                            duration: 600, 
                            delay: anime.stagger(100) 
                        }, '-=400')
                        // Pop in the data tags one by one
                        .add({ 
                            targets: card.querySelectorAll('.tag'), 
                            opacity: [0, 1], 
                            scale: [0.8, 1], 
                            duration: 500, 
                            delay: anime.stagger(50) 
                        }, '-=400');

                    // Stop observing once animated
                    observer.unobserve(card);
                }
            });
        }, { threshold: 0.15 });
        

        // Attach observer to section title and all cards
        observer.observe(document.querySelector('.section-title'));
        document.querySelectorAll('.feature-card').forEach(card => {
            observer.observe(card);
        });

        // 6. Continuous Ambient Animation
        anime({
            targets: ['.light-1', '.light-2'],
            scale: [1, 1.2, 1],
            opacity: [0.2, 0.4, 0.2],
            duration: 8000,
            loop: true,
            direction: 'alternate',
            easing: 'easeInOutSine'
        });
    </script>
</body>
</html>
